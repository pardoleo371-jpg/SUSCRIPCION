<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leonardo 601 - Suscripción</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .contenedor{
            width: 350px;
        }

        .formulario{
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label{
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
        }

        input[type="email"]{
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
            transition: 0.3s;
        }

        input[type="email"]:focus{
            border-color: #11998e;
            outline: none;
            box-shadow: 0 0 8px rgba(17,153,142,0.4);
        }

        .terminos{
            margin-top: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
        }

        button{
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #11998e;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #0d7f75;
        }

        .footer{
            text-align: center;
            margin-top: 15px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <div class="formulario">

            <h1>Suscripción</h1>

            <form>

                <label>Correo Electrónico:</label>

                <input 
                    type="email"
                    placeholder="correo@ejemplo.com"
                    required>

                <div class="terminos">
                    <input type="checkbox" required>
                    <span>Acepto los términos y condiciones</span>
                </div>

                <button type="submit">
                    Suscribirme
                </button>

            </form>

        </div>

        <div class="footer">
            Leonardo 601
        </div>

    </div>

</body>
</html>
